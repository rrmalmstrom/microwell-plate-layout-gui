# Microwell Plate GUI - Minimal Production Environment
# This environment contains only the essential packages needed to run the application
# Based on comprehensive code analysis of all Python files and dependencies

name: microwell-gui-dev
channels:
  - conda-forge
  - defaults

dependencies:
  # Core Python runtime (includes tkinter, sqlite3, and all standard library modules)
  - python>=3.8,<4.0
  
  # Essential external dependencies
  - ghostscript>=10.0  # Required for PDF export functionality (ps2pdf command)
  
  # Package manager for any future pip-only packages
  - pip
  
  # Optional: Uncomment if installation issues occur
  # - tk>=8.6  # Explicit tkinter support (usually included with Python)

# Notes:
# - tkinter (GUI framework) is built into Python
# - sqlite3 (database) is built into Python  
# - All other dependencies (os, sys, csv, logging, subprocess, etc.) are Python standard library
# - This minimal environment avoids the dependency conflicts of the 80+ package development environment
# - If you encounter import errors, see environment_dev.yml for additional packages

# Installation instructions:
# 1. conda env create -f environment.yml
# 2. conda activate microwell-plate-gui
# 3. python run_app.py
#
# To test the installation:
# python test_environment.py